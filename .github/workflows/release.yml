name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release. Format: <service>-v<X.Y.Z> (e.g. server-v0.4.0). Must already exist as a git tag."
        required: true
        type: string
  push:
    tags:
      - "forwarder-v*"
      - "receiver-v*"
      - "streamer-v*"
      - "emulator-v*"
      - "server-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SERVER_DOCKER_IMAGE: iwismer/rt-server

jobs:
  resolve-matrix:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.parse.outputs.service }}
      version: ${{ steps.parse.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Validate workflow_dispatch tag
        if: inputs.tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$INPUT_TAG" ]; then
            echo "::error::Tag input is empty."
            exit 1
          fi
          if ! [[ "$INPUT_TAG" =~ ^(forwarder|receiver|streamer|emulator|server)-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: '$INPUT_TAG'. Expected: <service>-v<X.Y.Z>"
            exit 1
          fi
          if ! gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$INPUT_TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$INPUT_TAG' does not exist on origin. Push the tag first."
            exit 1
          fi

      - name: Parse tag
        id: parse
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ "$TAG" =~ ^(forwarder|receiver|streamer|emulator|server)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            SERVICE="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
          else
            echo "::error::Invalid tag format: ${TAG}"
            echo "::error::Expected: <service>-v<semver> where service is one of forwarder|receiver|streamer|emulator|server"
            exit 1
          fi
          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Parsed tag: service=${SERVICE}, version=${VERSION}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Verify Cargo.toml version matches tag
        env:
          SERVICE: ${{ steps.parse.outputs.service }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          CARGO_VERSION=$(python3 - "$SERVICE" <<'PY'
          import sys
          import tomllib

          service = sys.argv[1]
          with open(f"services/{service}/Cargo.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["package"]["version"])
          PY
          )
          echo "Tag version: ${VERSION}"
          echo "Cargo.toml version: ${CARGO_VERSION}"
          if [ "${VERSION}" != "${CARGO_VERSION}" ]; then
            echo "::error::Version mismatch! Tag says ${VERSION} but services/${SERVICE}/Cargo.toml says ${CARGO_VERSION}"
            exit 1
          fi

      - name: Build matrix
        id: matrix
        env:
          SERVICE: ${{ steps.parse.outputs.service }}
        run: |
          case "$SERVICE" in
            forwarder|emulator)
              MATRIX=$(jq -c . <<'JSON'
          {
            "include": [
              { "os": "linux",   "arch": "x86_64", "runner": "ubuntu-latest",    "target": "x86_64-unknown-linux-gnu",      "use_cross": "false" },
              { "os": "linux",   "arch": "arm64",  "runner": "ubuntu-24.04-arm", "target": "aarch64-unknown-linux-gnu",     "use_cross": "false" },
              { "os": "linux",   "arch": "armv7",  "runner": "ubuntu-latest",    "target": "armv7-unknown-linux-gnueabihf", "use_cross": "true"  },
              { "os": "windows", "arch": "x86_64", "runner": "windows-latest",   "target": "x86_64-pc-windows-msvc",       "use_cross": "false" }
            ]
          }
          JSON
              )
              ;;
            receiver|streamer)
              MATRIX=$(jq -c . <<'JSON'
          {
            "include": [
              { "os": "linux",   "arch": "x86_64", "runner": "ubuntu-latest",  "target": "x86_64-unknown-linux-gnu", "use_cross": "false" },
              { "os": "windows", "arch": "x86_64", "runner": "windows-latest", "target": "x86_64-pc-windows-msvc",   "use_cross": "false" }
            ]
          }
          JSON
              )
              ;;
            server)
              # Keep a valid matrix output, but skip binary build/package jobs.
              MATRIX=$(jq -c . <<'JSON'
          {
            "include": [
              { "os": "linux", "arch": "x86_64", "runner": "ubuntu-latest", "target": "x86_64-unknown-linux-gnu", "use_cross": "false" }
            ]
          }
          JSON
              )
              ;;
            *)
              echo "::error::Unknown service: $SERVICE"
              exit 1
              ;;
          esac
          if [[ -z "${MATRIX}" ]]; then
            echo "::error::Failed to generate build matrix (jq returned empty output)"
            exit 1
          fi
          if ! echo "${MATRIX}" | jq empty 2>/dev/null; then
            echo "::error::Build matrix is not valid JSON: ${MATRIX}"
            exit 1
          fi
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Matrix: ${MATRIX}"

  build:
    name: Build ${{ needs.resolve-matrix.outputs.service }} (${{ matrix.os }}-${{ matrix.arch }})
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.service != 'server'
    runs-on: ${{ matrix.runner }}
    env:
      SERVICE: ${{ needs.resolve-matrix.outputs.service }}
      VERSION: ${{ needs.resolve-matrix.outputs.version }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}-${{ matrix.arch }}

      - name: Resolve build tool and output directory
        id: build-env
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            echo "build_cmd=cross" >> "$GITHUB_OUTPUT"
          else
            echo "build_cmd=cargo" >> "$GITHUB_OUTPUT"
          fi
          echo "bin_dir=target/${{ matrix.target }}/release" >> "$GITHUB_OUTPUT"

      - name: Install cross (cross-compilation)
        if: matrix.use_cross == 'true'
        shell: bash
        run: |
          set -o pipefail
          curl -fsSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.cargo/bin"
          cross --version

      - name: Setup Node.js (UI-embedded services)
        if: env.SERVICE == 'forwarder' || env.SERVICE == 'receiver'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: UI checks (forwarder/receiver only)
        if: env.SERVICE == 'forwarder' || env.SERVICE == 'receiver'
        run: |
          npm ci
          npm run lint --workspace "apps/${{ env.SERVICE }}-ui"
          npm run check --workspace "apps/${{ env.SERVICE }}-ui"
          npm test --workspace "apps/${{ env.SERVICE }}-ui"

      - name: Build release binary
        shell: bash
        run: |
          BUILD_CMD="${{ steps.build-env.outputs.build_cmd }}"
          BIN_DIR="${{ steps.build-env.outputs.bin_dir }}"
          if [[ -z "$BUILD_CMD" ]]; then
            echo "::error::build_cmd is empty - build-env step may have failed"
            exit 1
          fi
          if [[ -z "$BIN_DIR" ]]; then
            echo "::error::bin_dir is empty - build-env step may have failed"
            exit 1
          fi
          FEATURES=""
          case "${{ env.SERVICE }}" in
            forwarder|receiver)
              FEATURES="--features embed-ui"
              ;;
          esac
          $BUILD_CMD build --release --target ${{ matrix.target }} --package ${{ env.SERVICE }} --bin ${{ env.SERVICE }} $FEATURES

      - name: Package (Linux)
        if: matrix.os == 'linux'
        run: |
          ARCHIVE="${{ env.SERVICE }}-v${{ env.VERSION }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "${{ steps.build-env.outputs.bin_dir }}" ${{ env.SERVICE }}
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          ARCHIVE="${{ env.SERVICE }}-v${{ env.VERSION }}-${{ matrix.target }}.zip"
          BIN_DIR="${{ steps.build-env.outputs.bin_dir }}"
          cp "${BIN_DIR}/${{ env.SERVICE }}.exe" .
          7z a "$ARCHIVE" "${{ env.SERVICE }}.exe"
          rm "${{ env.SERVICE }}.exe"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Verify archive layout (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import zipfile

          archive = os.environ["ARCHIVE"]
          expected = f"{os.environ['SERVICE']}.exe"

          with zipfile.ZipFile(archive) as zf:
              names = zf.namelist()

          if names != [expected]:
              raise SystemExit(
                  f"unexpected zip layout: {names}; expected only {expected}"
              )
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  server-docker:
    name: Build and Push Server Docker Image
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.service == 'server'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/server/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.SERVER_DOCKER_IMAGE }}:v${{ needs.resolve-matrix.outputs.version }}
            ${{ env.SERVER_DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [resolve-matrix, build, server-docker]
    if: >
      always() &&
      needs.resolve-matrix.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs['server-docker'].result == 'success' || needs['server-docker'].result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        if: needs.resolve-matrix.outputs.service != 'server'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        if: needs.resolve-matrix.outputs.service != 'server'
        run: ls -lhR artifacts/

      - name: Create GitHub Release (service binaries)
        if: needs.resolve-matrix.outputs.service != 'server'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "${{ needs.resolve-matrix.outputs.service }} v${{ needs.resolve-matrix.outputs.version }}"
          generate_release_notes: true
          files: artifacts/*

      - name: Create GitHub Release (server metadata only)
        if: needs.resolve-matrix.outputs.service == 'server'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "${{ needs.resolve-matrix.outputs.service }} v${{ needs.resolve-matrix.outputs.version }}"
          generate_release_notes: true

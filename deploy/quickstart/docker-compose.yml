# Rusty Timer — Quickstart Compose
# Evaluates the server + dashboard with no Rust toolchain required.
# See README.md in this directory for usage instructions.

services:
  postgres:
    image: postgres:18-trixie
    container_name: rt-quickstart-postgres
    environment:
      POSTGRES_USER: rtserver
      POSTGRES_PASSWORD: quickstart-only-change-me
      POSTGRES_DB: rtserver
    volumes:
      - rt-quickstart-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtserver"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: iwismer/rt-server:latest
    container_name: rt-quickstart-server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://rtserver:quickstart-only-change-me@postgres/rtserver
      BIND_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      DASHBOARD_DIR: /srv/dashboard
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  rt-quickstart-pgdata:
